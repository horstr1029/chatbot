name: Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run all tests
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: chatbot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: services/ingestion/requirements.txt

      - name: Install Node dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Python dependencies
        working-directory: services/ingestion
        run: pip install -r requirements.txt

      - name: Generate Prisma client
        working-directory: apps/web
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/chatbot_test
        run: npx prisma generate --schema=../../prisma/schema.prisma && npx prisma db push --schema=../../prisma/schema.prisma --skip-generate

      - name: TypeScript check
        working-directory: apps/web
        run: npm run typecheck

      - name: Run unit tests
        working-directory: apps/web
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/chatbot_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm test -- --coverage --passWithNoTests

      - name: Run Python tests
        working-directory: services/ingestion
        run: python -m pytest tests/ -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/

  # ─────────────────────────────────────────
  # JOB 2: Build Docker images
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      web_image: ${{ steps.meta-web.outputs.tags }}
      ingestion_image: ${{ steps.meta-ingestion.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build web app image
      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build ingestion service image
      - name: Extract metadata (ingestion)
        id: meta-ingestion
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ingestion
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ingestion image
        uses: docker/build-push-action@v5
        with:
          context: services/ingestion
          file: services/ingestion/Dockerfile
          push: true
          tags: ${{ steps.meta-ingestion.outputs.tags }}
          labels: ${{ steps.meta-ingestion.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 3: Deploy to server via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            echo "==> Navigating to project directory"
            cd ~/company-chatbot

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Logging in to GitHub Container Registry"
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling latest images"
            docker compose -f docker/docker-compose.prod.yml pull

            echo "==> Restarting services (zero-downtime)"
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans

            echo "==> Running DB migrations"
            docker compose -f docker/docker-compose.prod.yml exec -T web npx prisma migrate deploy

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
            docker compose -f docker/docker-compose.prod.yml ps

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deployment failed. Check the Actions log for details.'
            })
